# The Library — Configuration
# Created by `library:config`. Edit manually or via `library_config_set`.

library:
  version: "1.0"

# The Reading Room — your project's canonical document home
# Recommended: a dedicated repo. Can also be a directory in an existing repo.
reading_room:
  path: "../my-reading-room"             # path to Reading Room (repo or directory)
  type: "repo"                           # repo | directory
  branding: "branding"                   # optional — centralized brand assets (kit, logos, tokens)
  # Standard directories (convention, not configurable):
  #   specs/        — canonical spec files
  #   plans/        — implementation plans
  #   checkpoints/  — session checkpoints

# Checkpoint storage. Optional — defaults to <reading_room.path>/checkpoints.
# HARD RULE: any explicit path MUST resolve under reading_room.path. The Library
# refuses to write checkpoints outside the Reading Room.
# checkpoints:
#   path: "./my-reading-room/checkpoints"

# Knowledge base (Obsidian-native, Karpathy 3-layer pattern)
vault:
  path: "./knowledge-base"              # where the vault lives (or will be created)
  schema_version: "karpathy-v1"         # vault structure pattern
  compile_protocol: "CLAUDE.md"         # compile instructions in vault root
  compile_order: "kb.yaml"              # compile order definition in vault root
  obsidian:
    wikilinks: true                     # wiki/ articles use [[wikilinks]] and #tags
    excluded_folders:                   # folders excluded from Obsidian search
      - "sources/raw"                   # raw source material — noisy in search

# Project standards — canonical docs surfaced into every session by the
# SessionStart hook. Paths are relative to reading_room.path. applies_to is
# a list of repo names or ["*"] for all repos.
# standards:
#   - name: "Testing Standard"
#     path: "standards/TESTING-STANDARD.md"
#     applies_to: ["*"]
#   - name: "Jira Workflow"
#     path: "standards/JIRA-WORKFLOW.md"
#     applies_to: ["*"]

# Project management integration
pm:
  provider: "none"                      # jira | linear | none
  # site_url: "https://yoursite.atlassian.net"  # Jira only
  # workflow_scheme: "SevenBelow Standard SDLC Workflow" # Default workflow to assign for Jira Projects
  # workflow:                             # Generalised ordered workflow (replaces per-provider special-cases)
  #   states: ["To Do", "In Progress", "In Review", "Closed"]
  #   in_progress: "In Progress"
  #   in_review: "In Review"
  #   closed: "Closed"
  projects: []                          # list of {key, name} objects
  # Example:
  # projects:
  #   - key: "PROJ"
  #     name: "My Project"
  #
  # Jira requires ATLASSIAN_EMAIL and JIRA_API_TOKEN env vars.
  # See docs/setup/jira-setup.md for full setup instructions.

# Graphify — cross-document relationship queries (optional)
graphify:
  enabled: false                        # set true after: pip install the-library[graphify]
  graph_path: "./graphify-out/graph.json"
  source_path: "./raw"                  # what Graphify indexes (relative to vault)
  mode: "deep"                          # deep | shallow
  mcp_port: 3001                        # Graphify MCP server port
  auto_rebuild: true                    # rebuild graph on ingest/compile

# Memory Management
memory:
  session_dir: "~/.library/sessions"
  budgets:
    critical: 300
    fresh: 500
    moderate_max: 1500
    domain_file_max: 500
  pruning:
    graduation_threshold: 5
    hitl_required: true
  keyword_learning:
    enabled: true
    hitl_required: true
    min_observations: 10
    hit_threshold: 0.8
    noise_threshold: 0.3
    drift_window_days: 30
    drift_drop_threshold: 0.4

# Context Brackets
context:
  warn_percentage: 50
  checkpoint_percentage: 60

# Hooks
hooks:
  enabled: true
  session_start: true
  user_prompt_submit: true
  stop: true
  pre_compact: true
  session_end: true
  status_line: true
